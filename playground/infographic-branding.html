<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Infographic Bot — Branding Playground</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #4f8cff;
    --border: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .tabs { display: flex; gap: 4px; margin-left: auto; }
  .header .tab {
    padding: 8px 20px; border-radius: 8px; cursor: pointer;
    background: var(--surface); color: var(--text-muted); font-size: 14px;
    border: 1px solid transparent; transition: all 0.2s;
  }
  .header .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .header .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 24px;
    padding: 32px;
  }

  .card {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(79,140,255,0.3); }
  .card .badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .card canvas { width: 100%; display: block; }
  .card .info { padding: 16px; }
  .card .info h3 { font-size: 15px; margin-bottom: 4px; }
  .card .info p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  .prompt-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; gap: 16px;
  }
  .prompt-bar .prompt-text {
    flex: 1; font-size: 13px; color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.5;
    max-height: 60px; overflow-y: auto;
  }
  .prompt-bar button {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-weight: 600;
    cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  .prompt-bar button:hover { opacity: 0.9; }

  .spacer { height: 100px; }
</style>
</head>
<body>

<div class="header">
  <h1>Infographic Branding Explorer</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('personal')">Personal</div>
    <div class="tab" onclick="switchTab('company')">CU Circuits</div>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="spacer"></div>

<div class="prompt-bar">
  <div class="prompt-text" id="prompt">Click a design to select it.</div>
  <button onclick="copyPrompt()">Copy Prompt</button>

let currentTab = "personal";
let selectedId = null;

function switchTab(tab) {
  currentTab = tab;
  selectedId = null;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  var tabs = document.querySelectorAll(".tab");
  tabs[tab === "personal" ? 0 : 1].classList.add("active");
  renderGrid();
  updatePrompt();
}

function renderGrid() {
  var designs = currentTab === "personal" ? personalDesigns : cuDesigns;
  var stories = currentTab === "personal" ? SAMPLE_STORIES : SAMPLE_CU;
  var grid = document.getElementById("grid");

  // Clear grid safely
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  designs.forEach(function(d, idx) {
    var card = document.createElement("div");
    card.className = "card" + (selectedId === d.id ? " selected" : "");
    card.addEventListener("click", function() { selectedId = d.id; renderGrid(); updatePrompt(); });

    var badge = document.createElement("div");
    badge.className = "badge";
    badge.textContent = String(idx + 1);
    card.appendChild(badge);

    var canvas = document.createElement("canvas");
    canvas.width = 540; canvas.height = 675;
    card.appendChild(canvas);

    var info = document.createElement("div");
    info.className = "info";
    var h3 = document.createElement("h3");
    h3.textContent = d.name;
    var p = document.createElement("p");
    p.textContent = d.desc;
    info.appendChild(h3);
    info.appendChild(p);
    card.appendChild(info);

    grid.appendChild(card);
    drawInfographic(canvas, d, stories);
  });
}

function drawInfographic(canvas, design, stories) {
  var ctx = canvas.getContext("2d");
  var W = canvas.width, H = canvas.height;
  var scale = 0.5;

  // Background
  if (design.bg[0] !== design.bg[1]) {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, design.bg[0]);
    grad.addColorStop(1, design.bg[1]);
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = design.bg[0];
  }
  ctx.fillRect(0, 0, W, H);

  // Grid pattern for Clean Fabrication
  if (design.gridPattern) {
    ctx.strokeStyle = "rgba(0,0,0,0.04)";
    ctx.lineWidth = 1;
    for (var gx = 0; gx < W; gx += 20) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = 0; gy < H; gy += 20) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  }

  var margin = 30;
  var y = 24;

  // Gradient accent bar for India Tech
  if (design.gradientAccent) {
    var aGrad = ctx.createLinearGradient(margin, y, W - margin, y);
    design.gradientAccent.forEach(function(c, i) { aGrad.addColorStop(i / (design.gradientAccent.length - 1), c); });
    ctx.fillStyle = aGrad;
    ctx.fillRect(margin, y, W - 2 * margin, 4);
    y += 12;
  }

  // Logo placeholder for company designs
  if (design.logo) {
    ctx.fillStyle = design.logoBg;
    ctx.beginPath();
    ctx.roundRect(margin, y, 36, 36, 6);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px -apple-system, sans-serif";
    ctx.fillText("CU", margin + 6, y + 24);
    y += 10;
  }

  // Title
  ctx.fillStyle = design.textPrimary;
  ctx.font = "bold " + (design.headerFont * scale) + "px -apple-system, sans-serif";
  ctx.fillText(design.titleText, margin + (design.logo ? 44 : 0), y + 30);

  if (design.subtitle) {
    ctx.fillStyle = design.textMuted;
    ctx.font = "12px -apple-system, sans-serif";
    ctx.fillText(design.subtitle, margin + (design.logo ? 44 : 0), y + 46);
  }

  // Date
  var dateX = design.logo ? margin + 44 : margin;
  ctx.fillStyle = design.textMuted;
  ctx.font = "11px -apple-system, sans-serif";
  ctx.fillText("March 25, 2026", dateX, y + (design.subtitle ? 62 : 48));
  y += design.subtitle ? 72 : 56;

  // Accent line
  ctx.strokeStyle = design.accentLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(margin, y);
  ctx.lineTo(W - margin, y);
  ctx.stroke();
  y += 14;

  // Stories
  var maxStories = Math.min(5, stories.length);
  var availH = H - y - 50;
  var cardH = Math.min(availH / maxStories - 8, 108);

  for (var i = 0; i < maxStories; i++) {
    var story = stories[i];
    var cat = story.category;
    var colors = CATEGORY_COLORS[cat] || CATEGORY_COLORS.industry;
    var cardTop = y;

    // Card background
    ctx.fillStyle = design.cardBg;
    ctx.beginPath();
    ctx.roundRect(margin - 4, cardTop, W - 2 * margin + 8, cardH, design.cardRadius * scale);
    ctx.fill();

    // Card border
    if (design.cardBorder) {
      ctx.strokeStyle = design.cardBorder;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(margin - 4, cardTop, W - 2 * margin + 8, cardH, design.cardRadius * scale);
      ctx.stroke();
    }

    var cy = cardTop + 12;

    // Category tag
    var icon = CATEGORY_ICONS[cat] || "";
    var tagText = icon + " " + cat.toUpperCase();
    ctx.font = "bold 9px -apple-system, sans-serif";

    if (design.tagStyle === "neon") {
      ctx.fillStyle = colors.primary;
      ctx.shadowColor = colors.primary;
      ctx.shadowBlur = 8;
      ctx.fillText(tagText, margin + 8, cy + 2);
      ctx.shadowBlur = 0;
    } else if (design.tagStyle === "underline") {
      ctx.fillStyle = colors.primary;
      ctx.fillText(tagText, margin + 8, cy + 2);
      ctx.strokeStyle = colors.primary;
      ctx.lineWidth = 2;
      ctx.beginPath();
      var tw = ctx.measureText(tagText).width;
      ctx.moveTo(margin + 8, cy + 5);
      ctx.lineTo(margin + 8 + tw, cy + 5);
      ctx.stroke();
    } else if (design.tagStyle === "bracket") {
      ctx.fillStyle = colors.primary;
      ctx.font = "bold 9px monospace";
      ctx.fillText("[" + tagText + "]", margin + 8, cy + 2);
    } else {
      // pill or chip
      var tagW = ctx.measureText(tagText).width + 18;
      ctx.fillStyle = colors.primary;
      ctx.beginPath();
      ctx.roundRect(margin + 6, cy - 8, tagW, 18, design.tagStyle === "pill" ? 9 : 4);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 9px -apple-system, sans-serif";
      ctx.fillText(tagText, margin + 14, cy + 3);
    }

    // Story number
    ctx.fillStyle = colors.accent;
    ctx.font = "bold 10px -apple-system, sans-serif";
    ctx.fillText(String(i + 1), W - margin - 16, cy + 3);

    cy += 18;

    // Headline
    ctx.fillStyle = design.textPrimary;
    ctx.font = "bold " + (design.headlineFont * scale) + "px -apple-system, sans-serif";
    var headline = story.headline.length > 42 ? story.headline.slice(0, 40) + "..." : story.headline;
    ctx.fillText(headline, margin + 8, cy + 4);
    cy += 18;

    // Bullets
    ctx.fillStyle = design.textSecondary;
    ctx.font = (design.bulletFont * scale) + "px -apple-system, sans-serif";
    story.bullets.slice(0, 2).forEach(function(b) {
      var bullet = b.length > 55 ? b.slice(0, 53) + "..." : b;
      ctx.fillText("\u2022 " + bullet, margin + 14, cy + 3);
      cy += 14;
    });

    y = cardTop + cardH + 6;
  }

  // Footer
  ctx.fillStyle = design.textMuted;
  ctx.font = "10px -apple-system, sans-serif";
  ctx.fillText("#AI #MachineLearning #DailyDigest", margin, H - 26);
  ctx.fillText("Generated by AI Infographic Bot \u2014 " + (design.watermark || "CU Circuits"), margin, H - 12);
}

function updatePrompt() {
  var el = document.getElementById("prompt");
  if (!selectedId) {
    el.textContent = "Click a design to select it.";
    return;
  }

  var designs = currentTab === "personal" ? personalDesigns : cuDesigns;
  var d = designs.find(function(x) { return x.id === selectedId; });
  var target = currentTab === "personal" ? "personal LinkedIn" : "CU Circuits company LinkedIn page";

  var parts = [
    "Use the \"" + d.name + "\" branding style for the " + target + " infographic.",
    "Background: " + (d.bg[0] === d.bg[1] ? d.bg[0] : "gradient from " + d.bg[0] + " to " + d.bg[1]) + ".",
    "Card style: " + d.cardBg + " background, " + d.cardRadius + "px radius, " + d.cardBorder + " border.",
    "Typography: title " + d.headerFont + "px bold, headlines " + d.headlineFont + "px bold, bullets " + d.bulletFont + "px.",
    "Colors: primary text " + d.textPrimary + ", secondary " + d.textSecondary + ", muted " + d.textMuted + ".",
    "Accent line: " + d.accentLine + ". Tag style: " + d.tagStyle + ".",
  ];

  if (d.logo) parts.push("Include CU Circuits logo placeholder (" + d.logoBg + " background).");
  if (d.subtitle) parts.push("Subtitle: \"" + d.subtitle + "\".");
  if (d.gradientAccent) parts.push("India tri-color gradient accent bar at top.");

  el.textContent = parts.join(" ");
}

function copyPrompt() {
  var text = document.getElementById("prompt").textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.querySelector(".prompt-bar button");
    btn.textContent = "Copied!";
    setTimeout(function() { btn.textContent = "Copy Prompt"; }, 1500);
  });
}

renderGrid();
</script>
